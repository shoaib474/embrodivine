version: "3.8"

services:

  backend:
    build: ./server
    container_name: mern_backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: always

  frontend:
    build: ./clients
    container_name: mern_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always